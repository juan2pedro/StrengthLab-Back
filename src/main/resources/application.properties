# ===================================================================
# COMMON APPLICATION PROPERTIES
# ===================================================================
#
# This file contains properties common to all environments.
# Specific properties are defined in profile-specific files
# (e.g., application-dev.properties, application-prod.properties).

# ----------------------------------------
# CORE
# ----------------------------------------
# Activate 'dev' profile by default for local development.
# For production, this should be overridden by an environment variable
# or command-line argument: -Dspring.profiles.active=prod
spring.profiles.active=dev

# ----------------------------------------
# JPA / HIBERNATE
# ----------------------------------------
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ----------------------------------------
# SPRING BOOT ACTUATOR
# ----------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never


# ===================================================================
# --- PRODUCTION PROFILE ---
#
# When running with 'prod' profile, these properties will be used.
# They rely on environment variables for security.
# ===================================================================
---
spring.config.activate.on-profile=prod

# PostgreSQL Database (from environment variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# In production, you might want to disable show-sql for cleaner logs
spring.jpa.show-sql=false
# 'validate' is safer for production than 'update'
spring.jpa.hibernate.ddl-auto=validate
